<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#07090c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- Border frame -->
  <rect x="32" y="32" width="1136" height="566" rx="16" fill="none" stroke="#1a2132" stroke-width="1.5"/>

  <!-- Gold accent line top -->
  <rect x="32" y="32" width="1136" height="3" rx="1.5" fill="#f5a623"/>

  <!-- Basketball emoji area -->
  <text x="600" y="210" font-size="100" text-anchor="middle" dominant-baseline="middle">🏀</text>

  <!-- SHORT WHITE GUYS -->
  <text x="600" y="310" font-family="'Arial Black', Impact, sans-serif" font-size="72" font-weight="900"
    fill="#f5a623" text-anchor="middle" letter-spacing="8">SHORT WHITE GUYS</text>

  <!-- TALKING HOOPS -->
  <text x="600" y="390" font-family="'Arial Black', Impact, sans-serif" font-size="56" font-weight="900"
    fill="#d8dfed" text-anchor="middle" letter-spacing="12">TALKING HOOPS</text>

  <!-- Divider line -->
  <rect x="540" y="418" width="120" height="2" rx="1" fill="#f5a623"/>

  <!-- 2026 NBA PLAYOFFS PICK'EM -->
  <text x="600" y="468" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="700"
    fill="#8a97a8" text-anchor="middle" letter-spacing="6">2026 NBA PLAYOFFS PICK'EM</text>

  <!-- Bottom tag -->
  <rect x="494" y="526" width="212" height="34" rx="4" fill="#f5a62318" stroke="#f5a62333" stroke-width="1"/>
  <text x="600" y="548" font-family="'Arial Black', Impact, sans-serif" font-size="12" font-weight="700"
    fill="#f5a623" text-anchor="middle" letter-spacing="4">swgth-pickem.vercel.app</text>
</svg>
